<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#090d16" />
    </linearGradient>
    <linearGradient id="d20Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="d20Accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb7185" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#38bdf8" stroke-width="12" stroke-opacity="0.6" />
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#d20Accent)" stroke-width="6" stroke-dasharray="16 12" opacity="0.45" />
  <g filter="url(#glow)">
    <!-- Outer d20 polygon -->
    <polygon points="256,64 416,160 416,352 256,448 96,352 96,160" fill="rgba(15,23,42,0.85)" stroke="url(#d20Grad)" stroke-width="14" stroke-linejoin="round" />
    <!-- Inner facets -->
    <polygon points="256,64 416,160 256,236" fill="url(#d20Grad)" fill-opacity="0.25" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <polygon points="256,64 96,160 256,236" fill="url(#d20Grad)" fill-opacity="0.12" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <polygon points="416,160 416,352 256,236" fill="url(#d20Accent)" fill-opacity="0.18" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <polygon points="96,160 96,352 256,236" fill="url(#d20Grad)" fill-opacity="0.18" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <polygon points="416,352 256,448 256,236" fill="url(#d20Grad)" fill-opacity="0.32" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <polygon points="96,352 256,448 256,236" fill="url(#d20Accent)" fill-opacity="0.28" stroke="url(#d20Grad)" stroke-width="8" stroke-linejoin="round" />
    <!-- Center number 20 -->
    <text x="256" y="278" font-family="Outfit, sans-serif" font-size="88" font-weight="800" text-anchor="middle" fill="#f8fafc" letter-spacing="-2">20</text>
  </g>
  <circle cx="380" cy="110" r="10" fill="#38bdf8" />
  <circle cx="130" cy="390" r="12" fill="#f43f5e" />
  <circle cx="110" cy="130" r="8" fill="#ffffff" opacity="0.8" />
</svg>
